/* ─── FINANCIAL UTILS ───────────────────────────────────── */
function calcIRR(cf,g=0.1){
  let r=g;
  for(let i=0;i<400;i++){
    let f=0,d=0;
    cf.forEach((c,t)=>{const p=Math.pow(1+r,t);f+=c/p;if(t)d-=t*c/(p*(1+r));});
    if(Math.abs(d)<1e-15)break;
    const n=r-f/d;
    if(Math.abs(n-r)<1e-10)return n;
    r=n;
  }
  return r;
}

function buildAmortization({loanAmount,numEMIs,advanceEMIs=0,discountRate=0,fldgRate=0,regularInterestAmt=0}){
  const L=+loanAmount,n=+numEMIs,a=+advanceEMIs;
  const disc=+discountRate,fldg=+fldgRate,ri=+regularInterestAmt;
  const discAmt=L*disc/100;
  const retAmt=(L-discAmt)*fldg/100;
  const emiAmt=ri>0?(L+ri)/n:L/n;
  const advAmt=emiAmt*a;
  const netOut=L-discAmt-retAmt-advAmt;
  const netEMIs=n-a;
  const cfs=[-netOut,...Array(netEMIs).fill(emiAmt)];
  const mIRR=calcIRR(cfs);
  const sched=[];
  let ob=netOut;
  for(let i=1;i<=netEMIs;i++){
    const interest=ob*mIRR;
    const principal=emiAmt-interest;
    const cb=ob-principal;
    sched.push({month:i,ob,emiAmt,interest,principal,cb});
    ob=cb;
  }
  return{sched,mIRR,aIRR:mIRR*12,netOut,emiAmt,discAmt,retAmt,advAmt,netEMIs};
}

function getFCRate(lender='',fldg=0){
  const l=lender.toLowerCase();
  if(l.includes('axis'))return 0;
  if(l.includes('western capital'))return 1.18;
  if(l.includes('arka'))return 1.18;
  if(l.includes('ratnaafin'))return(fldg>=20?0:2.95);
  if(l.includes('fintree'))return 2.95;
  if(l.includes('mirae'))return 2.95;
  return 2.95;
}

/* ─── FETCH GOOGLE SHEET ────────────────────────────────── */
async function fetchSheet(sheetId,gid){
  const url=`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&single=true`;
  const res=await fetch(url,{mode:'cors'});
  if(!res.ok)throw new Error(`HTTP ${res.status} - Check sheet is set to "Anyone with link can view"`);
  const txt=await res.text();
  return Papa.parse(txt,{skipEmptyLines:true}).data;
}

function findRow(rows,appId){
  const id=appId.toString().trim();
  const idN=parseInt(id);
  // Search ALL rows (handles 1 or 2 header rows, and numeric format like 1247543.0)
  for(let i=0;i<rows.length;i++){
    const cell=rows[i]&&rows[i][COL_APPID];
    if(!cell)continue;
    const cs=cell.toString().trim().replace(/\.0+$/,'');
    if(cs===id||parseInt(cs)===idN)return rows[i];
  }
  return null;
}

// Header-aware row finder for DISB Dump (finds header row first, then maps by column name)
function findDisbRow(rows,appId){
  const id=appId.toString().trim();
  const idN=parseInt(id);
  // First scan all rows looking for App ID match in col 0
  for(let i=0;i<rows.length;i++){
    const cell=rows[i]&&rows[i][0];
    if(!cell)continue;
    const cs=cell.toString().trim().replace(/\.0+$/,'');
    if(cs===id||parseInt(cs)===idN){
      // Found data row — now find header row above it
      let headerIdx=i-1;
      while(headerIdx>=0&&(!rows[headerIdx]||!rows[headerIdx][0]||parseInt(rows[headerIdx][0])>0))headerIdx--;
      const headerRow=rows[Math.max(0,headerIdx)]||[];
      const obj={_row:rows[i],_header:headerRow};
      headerRow.forEach((h,idx)=>{if(h)obj[h.toString().trim()]=rows[i][idx];});
      // Also store raw by index
      rows[i].forEach((v,idx)=>{obj[`_col${idx}`]=v;});
      return obj;
    }
  }
  return null;
}

/* ─── FORMAT HELPERS ────────────────────────────────────── */
const f$=(n,d=2)=>{if(n==null||isNaN(n))return'₹0.00';return'₹'+Math.abs(+n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d})};

    const rows=r.sched.map((s,i)=>[s.month,+s.ob.toFixed(2),+s.emiAmt.toFixed(2),+s.interest.toFixed(2),+s.principal.toFixed(2),+s.cb.toFixed(2),i<r.emisPaid?'PAID':'PENDING']);
    const ws2=XLSX.utils.aoa_to_sheet([hdrs,...rows]);
    ws2['!cols']=hdrs.map(()=>({wch:18}));

}

/* ─── CALCULATOR ────────────────────────────────────────── */
function CalcTab({session,onHist}){
  const[appId,sAI]=useState('');
  const[d1,sD1]=useState('');
  const[d2,sD2]=useState('');
  const[fcOvr,sFO]=useState('');
  const[loading,sL]=useState(false);
  const[msg,sM]=useState('');
  const[fetched,sF]=useState(null);
  const[result,sR]=useState(null);
  const[error,sE]=useState('');
  const[showAll,sSA]=useState(false);

  const uDays=d1&&d2?diffDays(d1,d2):null;
  const tDays=uDays!=null?uDays+10:null;

  const go=async()=>{
    if(!appId.trim()){sE('Please enter Application ID');return;}
    if(!d1){sE('Please enter Last Payment Date');return;}
    if(!d2){sE('Please enter Payment Received Date');return;}
    sL(true);sE('');sF(null);sR(null);
    try{
      /* Step 1: DISB Dump */
      sM('📡 Connecting to DISB Dump...');
      let disbRows;
      try{disbRows=await fetchSheet(S1_ID,S1_GID);}
      catch(e){throw new Error('DISB Dump unreachable. Ensure Google Sheet is set to "Anyone with link can view".');}
      const dr=findDisbRow(disbRows,appId);
      if(!dr)throw new Error(`App ID "${appId}" not found in DISB Dump. Please verify:\n1. App ID is correct\n2. Google Sheet is set to "Anyone with link can view"\n3. App ID exists in DISB Dump sheet`);

      // Helper: try named header column first, fallback to index
      const gc=(names,idx,def='')=>{
        for(const n of names){if(dr[n]!==undefined&&dr[n]!==null&&dr[n]!=='')return dr[n];}
        return dr[`_col${idx}`]||def;
      };

      /* DISB Dump columns (confirmed from screenshot):
         A=App ID, B=Student Name, C=Tranche Amount, D=Loan Live Date,
         E=Number of EMIs, F=Advance EMIs, G=Net Tenure, H=Discount Rate,
         I=Total Regular Int Rate, J=FLDG %, K=Group Name, L=NBFC/Lender... */
      const studentName=gc(['Student Name','Name of Student'],1);
      const loanAmount=parseFloat(gc(['Tranche Amount','Loan Amount'],2))||0;
      const disbDate=gc(['Loan Live Date','Loan Live Date (MM/DD/YYYY)','Disbursement Date'],3);
      const numEMIs=parseInt(gc(['Number of EMIs','No of EMIs','Total EMIs'],4))||0;
      const advanceEMIs=parseInt(gc(['Advance EMIs','Advance EMI','Adv EMI'],5))||0;
      const discountRate=parseFloat(gc(['Discount Rate','Discount %'],7))||0;
      const fldgRate=parseFloat(gc(['FLDG %','FLDG','Retention %'],9))||0;
      const groupName=gc(['Group Name','School','Institution'],10);
      const lender=gc(['NBFC / Lender','Lender','NBFC'],11);
      const parentName=gc(['Parent Name','parent_name'],12);
      const regularIntAmt=parseFloat(gc(['Regular Interest amount','Regular Interest'],13))||0;

      /* Step 2: PD / DATA sheet */
      sM('📡 Fetching payment records...');
      let emisPaid=0,bounce=0;
      try{
        const pdRows=await fetchSheet(S2_ID,S2_GID);
        // Search all rows for App ID match in col A (index 0)
        const id=appId.toString().trim();
        const idN=parseInt(id);
        for(let i=0;i<pdRows.length;i++){
          const cell=pdRows[i]&&pdRows[i][0];
          if(!cell)continue;
          const cs=cell.toString().trim().replace(/\.0+$/,'');
          if(cs===id||parseInt(cs)===idN){
            const pr=pdRows[i];
            emisPaid=parseInt(pr[COL_EMIS]?.toString().replace(/\.0+$/,''))||0;
            bounce=parseFloat(pr[COL_BOUNCE])||0;
            break;
          }
        }
      }catch(e){console.warn('PD fetch:',e.message);}

      /* Step 3: Amortization */
      sM('⚙️ Calculating...');
      const am=buildAmortization({loanAmount,numEMIs,advanceEMIs,discountRate,fldgRate,regularInterestAmt:regularIntAmt});

      /* Step 4: POS */
      let pos=am.netOut;
      if(emisPaid>0&&emisPaid<=am.sched.length)pos=Math.max(0,am.sched[emisPaid-1].cb);

      /* Step 5: Utilization */
      const uD=diffDays(d1,d2);
      const tD=uD+10;

      /* Step 6: Interest */
      const dailyInt=pos*am.mIRR/30;
      const proInt=dailyInt*tD;

      /* Step 7: FC */
      const fcRate=fcOvr!==''?parseFloat(fcOvr):getFCRate(lender,fldgRate);
      const fcBase=pos+proInt;
      const fcCharge=fcBase*fcRate/100;

      /* Step 8: Total */
      const total=pos+proInt+fcCharge+bounce;
      const paidByParent=am.emiAmt*(emisPaid+advanceEMIs);
      const refund=paidByParent-total;

      const res={
        appId,studentName,parentName,groupName,lender,loanAmount,numEMIs,advanceEMIs,
        discountRate,fldgRate,regularIntAmt,
        emiAmt:am.emiAmt,discAmt:am.discAmt,retAmt:am.retAmt,advAmt:am.advAmt,
        netOut:am.netOut,mIRR:am.mIRR,aIRR:am.aIRR,
        disbDate,emisPaid,lastDate:d1,recDate:d2,
        uDays:uD,tDays:tD,
        dailyInt,pos,proInt,fcRate,fcBase,fcCharge,
        bounce,total,paidByParent,refund,
        sched:am.sched,
        calcAt:new Date().toISOString(),
        calcBy:session?.name||session?.username
      };
      sF({studentName,parentName,groupName,lender,loanAmount,numEMIs,advanceEMIs,discountRate,fldgRate,disbDate,emisPaid,bounce});
      sR(res);
      onHist({id:Date.now(),appId,studentName,groupName,lender,emisPaid,
        calcBy:session?.username,calcByName:session?.name||session?.username,
        calcAt:new Date().toISOString(),pos,proInt,fcCharge,bounce,total});
    }catch(e){sE(e.message);}
    finally{sL(false);sM('');}
  };

  const reset=()=>{sAI('');sD1('');sD2('');sFO('');sF(null);sR(null);sE('');sSA(false);};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:22}}>
      {/* Input Card */}
      <div className="card fadein" style={{padding:26}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>

function HistTab({history,session}){
  const[q,sQ]=useState('');

    const ms=!q||h.appId?.toString().includes(q)||h.studentName?.toLowerCase().includes(q.toLowerCase())||h.calcByName?.toLowerCase().includes(q.toLowerCase());
    const mf=uf==='all'||h.calcBy===session?.username;
    return ms&&mf;
  });
  return(
    <div className="card" style={{padding:24}}>
      <div style={{display:'flex',flexWrap:'wrap',gap:12,marginBottom:20,alignItems:'center'}}>
        <h2 style={{fontSize:17,fontWeight:800,color:'#0d1f3c',flex:1}}>📋 Calculation History &amp; Audit Log</h2>
        <input value={q} onChange={e=>sQ(e.target.value)} placeholder="Search App ID / Name / User..." style={{width:240}}/>

          <select value={uf} onChange={e=>sUF(e.target.value)} style={{width:160}}>
            <option value="all">All Users</option>

          <div style={{fontSize:44,marginBottom:12}}>📭</div>
          <p style={{fontWeight:600}}>No calculations found</p>
          <p style={{fontSize:13,marginTop:4}}>Run a calculation to see it here</p>

        <>
          <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Showing {filtered.length} records</p>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr>
                {['App ID','Student Name','Group','Lender','EMIs Paid','POS (A)','Prorated (B)','FC Charge (C)','Bounce (D)','Total to Close','By','Date & Time'].map(h=><th key={h}>{h}</th>)}

              <tbody>
                {filtered.map(h=>(

                    <td><span className="tag tag-b">{h.appId}</span></td>
                    <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{h.studentName||'—'}</td>
                    <td style={{color:'var(--muted)',fontSize:12}}>{h.groupName||'—'}</td>
                    <td style={{color:'var(--muted)',fontSize:12,whiteSpace:'nowrap'}}>{h.lender||'—'}</td>
                    <td style={{textAlign:'center',fontWeight:700}}>{h.emisPaid}</td>
                    <td className="mono">{f$(h.pos)}</td>
                    <td className="mono">{f$(h.proInt)}</td>
                    <td className="mono">{f$(h.fcCharge)}</td>
                    <td className="mono">{f$(h.bounce)}</td>
                    <td className="mono" style={{fontWeight:800,color:'#0d1f3c'}}>{f$(h.total)}</td>

                    <td style={{color:'var(--muted)',fontSize:12,whiteSpace:'nowrap'}}>{fDate(h.calcAt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

/* ─── ADMIN ─────────────────────────────────────────────── */
function AdminTab({users,setUsers,history}){
  const[form,sForm]=useState({username:'',password:'',name:'',email:'',role:'user'});
  const[err,sE]=useState('');const[ok,sO]=useState('');
  const addUser=async()=>{
    if(!form.username||!form.password||!form.name){sE('Name, Username and Password required');return;}
    if(users.find(u=>u.username===form.username)){sE('Username already exists');return;}
    const nu={...form,id:Date.now(),createdAt:new Date().toISOString()};
    const upd=[...users,nu];
    setUsers(upd);await stor.set('users',upd);
    sForm({username:'',password:'',name:'',email:'',role:'user'});
    sE('');sO('User created!');setTimeout(()=>sO(''),3000);
  };
  const delUser=async(id)=>{const upd=users.filter(u=>u.id!==id);setUsers(upd);await stor.set('users',upd);};
  const cnt={};history.forEach(h=>{cnt[h.calcBy]=(cnt[h.calcBy]||0)+1;});
  const monthly=history.filter(h=>new Date(h.calcAt)>new Date(Date.now()-30*86400000)).length;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:22}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:14}}>
        <KPI label="Total Users" value={users.length} color="var(--blue)" bg="var(--lblue)" icon="👥"/>
        <KPI label="Total Calculations" value={history.length} color="var(--green)" bg="var(--lgreen)" icon="🧮"/>
        <KPI label="This Month" value={monthly} color="var(--yellow)" bg="var(--lyellow)" icon="📅"/>
        <KPI label="Active Users" value={Object.keys(cnt).length} color="var(--purple)" bg="var(--lpurple)" icon="✅"/>
      </div>
      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:15,fontWeight:800,color:'#0d1f3c',marginBottom:18}}>➕ Add New User</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}}>
          {[['Full Name *','name','text','John Doe'],['Username *','username','text','johndoe'],['Password *','password','password','••••••••'],['Email','email','email','john@gq.com']].map(([l,k,t,ph])=>(
            <div key={k}>
              <label style={{display:'block',fontSize:12,fontWeight:700,color:'#374151',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>{l}</label>
              <input type={t} value={form[k]} onChange={e=>sForm(f=>({...f,[k]:e.target.value}))} placeholder={ph}/>
            </div>
          ))}
          <div>
            <label style={{display:'block',fontSize:12,fontWeight:700,color:'#374151',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Role</label>
            <select value={form.role} onChange={e=>sForm(f=>({...f,role:e.target.value}))}>
              <option value="user">User (Standard)</option>
              <option value="admin">Admin (Full Access)</option>
            </select>
          </div>
        </div>
        {err&&<div className="err" style={{marginTop:12}}>{err}</div>}
        {ok&&<div className="ok" style={{marginTop:12}}>✓ {ok}</div>}
        <button className="btn btn-p" onClick={addUser} style={{marginTop:16}}>Create User</button>
      </div>
      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:15,fontWeight:800,color:'#0d1f3c',marginBottom:16}}>👥 All Users</h3>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>{['Name','Username','Email','Role','Searches','Created','Action'].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id}>
                  <td style={{fontWeight:700}}>{u.name}</td>
                  <td className="mono" style={{color:'var(--muted)'}}>{u.username}</td>
                  <td style={{color:'var(--muted)',fontSize:12}}>{u.email||'—'}</td>
                  <td><span className={`tag ${u.role==='admin'?'tag-b':'tag-gr'}`}>{u.role==='admin'?'👑 Admin':'👤 User'}</span></td>
                  <td style={{textAlign:'center',fontWeight:700}}>{cnt[u.username]||0}</td>
                  <td style={{color:'var(--muted)',fontSize:12,whiteSpace:'nowrap'}}>{fDate(u.createdAt)}</td>
                  <td>{u.username!=='admin'&&<button className="btn btn-r" style={{padding:'4px 12px',fontSize:12}} onClick={()=>delUser(u.id)}>Delete</button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── ROOT APP ──────────────────────────────────────────── */
function App(){
  const[session,sS]=useState(null);
  const[users,sU]=useState(DFLT_USERS);
  const[history,sH]=useState([]);
  const[page,sP]=useState('calc');
  const[boot,sB]=useState(true);

  useEffect(()=>{
    (async()=>{
      const s=await stor.get('session');if(s?.username)sS(s);
      const u=await stor.get('users');if(u?.length)sU(u);
      const h=await stor.get('history');if(h)sH(h);
      sB(false);
    })();
  },[]);

  const login=async(un,pw)=>{
    const lu=await stor.get('users',users);
    const user=lu.find(u=>u.username===un&&u.password===pw);
    if(!user)return'Invalid username or password';
    const s={...user,loginTime:new Date().toISOString()};
    sS(s);await stor.set('session',s);return null;

  const logout=async()=>{sS(null);await stor.set('session',null);};

    const upd=[e,...history].slice(0,1000);sH(upd);await stor.set('history',upd);
  };

  if(boot)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f1f5f9'}}>
      <Spin text="Loading portal..."/>
    </div>
  );
  if(!session)return<LoginPage onLogin={login}/>;

  const nav=[
    {id:'calc',icon:'🧮',label:'Calculator'},
    {id:'hist',icon:'📋',label:'History'},
    ...(session.role==='admin'?[{id:'admin',icon:'⚙️',label:'Admin'}]:[]),

  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <header style={{background:'#0d1f3c',color:'#fff',padding:'0 24px',height:58,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 12px rgba(0,0,0,.4)'}}>

          <div>
            <div style={{fontWeight:900,fontSize:15,lineHeight:1.2,letterSpacing:'-.01em'}}>GQ Dropout Refund Calculator</div>
            <div style={{fontSize:11,opacity:.4,letterSpacing:'.03em'}}>Education Finance Portal</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{textAlign:'right',display:'none'}}>
            <div style={{fontSize:13,fontWeight:700}}>{session.name}</div>
            <div style={{fontSize:11,opacity:.4}}>{session.role==='admin'?'👑 Admin':'User'}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'6px 12px'}}>
            <div style={{width:28,height:28,background:'#1d4ed8',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800}}>

            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,lineHeight:1.2}}>{session.name||session.username}</div>
              <div style={{fontSize:10,opacity:.4}}>{session.role==='admin'?'👑 Admin':'👤 User'}</div>
            </div>
          </div>
          <button onClick={logout} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.15)',color:'#fff',borderRadius:8,padding:'7px 15px',cursor:'pointer',fontSize:13,fontWeight:600,transition:'all .15s'}}
            onMouseEnter={e=>e.target.style.background='rgba(255,255,255,.18)'}
            onMouseLeave={e=>e.target.style.background='rgba(255,255,255,.1)'}>
            Sign Out
          </button>
        </div>
      </header>
      <div style={{display:'flex',minHeight:'calc(100vh - 58px)'}}>
        <nav style={{width:195,background:'#fff',borderRight:'1px solid var(--border)',padding:'16px 10px',flexShrink:0}}>
          {nav.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>sP(n.id)}>
              <span style={{fontSize:17}}>{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
          <div style={{marginTop:28,background:'linear-gradient(135deg,var(--lblue),#dbeafe)',borderRadius:12,padding:'14px 13px',border:'1px solid #bfdbfe'}}>
            <p style={{fontSize:11,fontWeight:800,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:9}}>Quick Guide</p>
            {['1. Enter App ID','2. Set both dates','3. Click Calculate','4. Export Excel'].map(t=>(
              <p key={t} style={{fontSize:11,color:'#3b82f6',margin:'4px 0',display:'flex',alignItems:'center',gap:5}}>
                <span style={{opacity:.6}}>›</span>{t}
              </p>
            ))}
          </div>
          <div style={{marginTop:14,background:'var(--surface)',borderRadius:10,padding:'11px 13px',border:'1px solid var(--border)'}}>
            <p style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Formula</p>
            <p style={{fontSize:10,color:'var(--muted)',lineHeight:1.6}}>
              POS + Pro-Rated<br/>+ FC Charge<br/>+ Bounce = Total
            </p>
          </div>
        </nav>
        <main style={{flex:1,padding:24,minWidth:0}}>
          {page==='calc'&&<CalcTab session={session} onHist={addHist}/>}
          {page==='hist'&&<HistTab history={history} session={session}/>}
          {page==='admin'&&session.role==='admin'&&<AdminTab users={users} setUsers={sU} history={history}/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
